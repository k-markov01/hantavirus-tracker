<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHO Hantavirus Outbreak Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #050a0e;
      --bg2: #0a1219;
      --bg3: #0f1c27;
      --border: #1a3040;
      --border2: #24485e;
      --text: #c8dde8;
      --text-dim: #5a7e92;
      --text-bright: #e8f4fa;
      --accent: #00d4ff;
      --accent2: #0090b8;

      --color-cases: #e63946;
      --color-exposure: #f4a261;
      --color-monitoring: #e9c46a;
      --color-mentioned: #4a6070;
      --color-ocean: #060e14;
      --color-land: #0d2030;
      --color-graticule: #0a1a24;
      --color-border: #162636;

      --glow-cases: 0 0 12px rgba(230, 57, 70, 0.6);
      --glow-accent: 0 0 16px rgba(0, 212, 255, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body.light-theme {
      --bg: #f2f6f8;
      --bg2: #ffffff;
      --bg3: #ecf2f5;
      --border: #d3dde3;
      --border2: #b7c8d2;
      --text: #173242;
      --text-dim: #557182;
      --text-bright: #08141b;
      --color-mentioned: #7a909d;
      --color-ocean: #ffffff;
      --color-land: #f5f8fa;
      --color-graticule: #e6edf2;
      --color-border: #c7d3db;
      --glow-accent: 0 0 16px rgba(0, 144, 184, 0.22);
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .header-icon {
      width: 32px; height: 32px;
      background: var(--color-cases);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: var(--glow-cases);
      flex-shrink: 0;
    }
    .header-title {
      flex: 1;
    }
    .header-title h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .header-title .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    .header-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 2px;
      background: rgba(230,57,70,0.15);
      border: 1px solid var(--color-cases);
      color: var(--color-cases);
      letter-spacing: 1.5px;
    }
    .header-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      text-align: right;
    }
    .header-meta a {
      color: var(--accent);
      text-decoration: none;
    }
    .header-meta a:hover { text-decoration: underline; }

    /* ── Main layout ─────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────── */
    .sidebar {
      width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-section h3 {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      font-family: 'DM Mono', monospace;
    }

    /* Legend */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 3px;
      transition: background 0.15s;
    }
    .legend-item:hover { background: rgba(255,255,255,0.04); }
    .legend-swatch {
      width: 14px; height: 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }
    .legend-count {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .marker-legend {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .marker-icon {
      width: 20px;
      text-align: center;
      font-size: 14px;
    }

    /* Country list */
    .country-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .country-list::-webkit-scrollbar { width: 3px; }
    .country-list::-webkit-scrollbar-track { background: var(--bg2); }
    .country-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .country-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .country-item:hover { background: rgba(0, 212, 255, 0.05); }
    .country-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .country-copy {
      flex: 1;
      min-width: 0;
    }
    .country-name {
      font-size: 13px;
      color: var(--text);
      display: block;
    }
    .country-evidence {
      margin-top: 3px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      line-height: 1.4;
      color: var(--text-dim);
    }
    .country-role-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 2px;
      letter-spacing: 0.5px;
    }

    /* Controls */
    .controls {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .btn {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 7px 12px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--text);
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }
    .btn.primary {
      border-color: var(--color-cases);
      color: var(--color-cases);
    }
    .btn.primary:hover {
      background: rgba(230, 57, 70, 0.1);
    }
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Map area ────────────────────────────────────── */
    .map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--color-ocean);
    }

    #map-svg {
      width: 100%;
      height: 100%;
      cursor: grab;
    }
    #map-svg:active { cursor: grabbing; }

    /* Graticule */
    .graticule { fill: none; stroke: var(--color-graticule); stroke-width: 0.3; }
    .sphere { fill: var(--color-ocean); }
    .country { stroke: var(--color-border); stroke-width: 0.5; transition: opacity 0.2s; }
    .country:hover { stroke: rgba(0, 212, 255, 0.5); stroke-width: 1; }

    /* Country fill colors */
    .country[data-role="cases"]     { fill: var(--color-cases); }
    .country[data-role="exposure"]  { fill: var(--color-exposure); }
    .country[data-role="monitoring"]{ fill: var(--color-monitoring); }
    .country[data-role="mentioned"] { fill: var(--color-mentioned); }
    .country[data-role="none"]      { fill: var(--color-land); }

    /* Country labels */
    .country-label {
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      fill: rgba(200, 221, 232, 0.55);
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .country-label.active {
      fill: var(--text-bright);
      font-size: 9px;
      font-weight: bold;
    }

    /* Markers */
    .marker-death-group {
      pointer-events: all;
      cursor: pointer;
    }
    .marker-death-badge {
      fill: #68151e;
      stroke: #ff8080;
      stroke-width: 1.5;
      filter: drop-shadow(0 0 5px rgba(230, 57, 70, 0.75));
    }
    .marker-death-count {
      fill: var(--text-bright);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .marker-death-icon {
      fill: var(--text-bright);
      font-size: 8px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }
    .marker-case {
      fill: var(--color-cases);
      stroke: #ff8080;
      stroke-width: 1.5;
    }
    .marker-case-group {
      pointer-events: all;
      cursor: pointer;
    }
    .marker-case-count {
      fill: var(--text-bright);
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    /* Zoom controls */
    .zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .zoom-btn {
      width: 32px; height: 32px;
      background: var(--bg2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      font-family: monospace;
    }
    .zoom-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 10px 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      font-size: 13px;
      max-width: 220px;
      z-index: 100;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-name {
      font-weight: 700;
      color: var(--text-bright);
      font-size: 14px;
      margin-bottom: 4px;
    }
    #tooltip .tt-role {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 2px;
      display: inline-block;
      margin-bottom: 4px;
    }
    #tooltip .tt-meta { font-size: 11px; color: var(--text-dim); }
    #tooltip .tt-evidence {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(36, 72, 94, 0.4);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      line-height: 1.45;
      color: var(--text);
    }

    /* Status bar */
    .statusbar {
      height: 24px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 20px;
      flex-shrink: 0;
    }
    .status-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .status-dot.loading {
      background: var(--color-monitoring);
      animation: blink 0.8s ease-in-out infinite;
      box-shadow: 0 0 6px var(--color-monitoring);
    }
    .status-dot.error {
      background: var(--color-cases);
      box-shadow: var(--glow-cases);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Loading overlay */
    #loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5, 10, 14, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
      gap: 16px;
    }
    #loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    /* Scan line effect */
    .map-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--border2);
      border-style: solid;
      pointer-events: none;
      z-index: 6;
    }
    .corner.tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-icon">☣</div>
  <div class="header-title">
    <h1>WHO Hantavirus Outbreak Tracker</h1>
    <div class="subtitle" id="header-subtitle">Initializing data stream...</div>
  </div>
  <div class="header-badge" id="freshness-badge">LIVE</div>
  <div class="header-meta">
    <div>Source: <a href="https://www.who.int" target="_blank">who.int</a></div>
    <div id="fetched-at-label">—</div>
  </div>
</header>

<!-- Main -->
<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sidebar-section">
      <h3>Country Role</h3>
      <div class="legend-item" data-filter="cases">
        <div class="legend-swatch" style="background:var(--color-cases)"></div>
        <span class="legend-label">Active Cases</span>
        <span class="legend-count" id="count-cases">—</span>
      </div>
      <div class="legend-item" data-filter="exposure">
        <div class="legend-swatch" style="background:var(--color-exposure)"></div>
        <span class="legend-label">Exposure Source</span>
        <span class="legend-count" id="count-exposure">—</span>
      </div>
      <div class="legend-item" data-filter="monitoring">
        <div class="legend-swatch" style="background:var(--color-monitoring)"></div>
        <span class="legend-label">Monitoring</span>
        <span class="legend-count" id="count-monitoring">—</span>
      </div>
      <div class="legend-item" data-filter="mentioned">
        <div class="legend-swatch" style="background:var(--color-mentioned)"></div>
        <span class="legend-label">Response Mention</span>
        <span class="legend-count" id="count-mentioned">—</span>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Location Markers</h3>
      <div class="marker-legend">
        <div class="marker-icon">💀</div>
        <span style="font-size:13px">Death location</span>
      </div>
      <div class="marker-legend">
        <div class="marker-icon">
          <svg width="14" height="14" viewBox="0 0 14 14">
            <circle cx="7" cy="7" r="5" fill="var(--color-cases)" stroke="#ff8080" stroke-width="1.5"/>
          </svg>
        </div>
        <span style="font-size:13px">Active case location</span>
      </div>
    </div>

    <div class="country-list" id="country-list">
      <div style="padding: 12px 16px; font-family:'DM Mono',monospace; font-size:11px; color:var(--text-dim)">
        Loading country data...
      </div>
    </div>

    <div class="controls">
      <button class="btn primary" id="btn-refresh">⟳ &nbsp;Refresh WHO Data</button>
      <button class="btn" id="btn-reset-zoom">Reset Zoom</button>
      <button class="btn" id="btn-theme">White Theme</button>
      <a href="https://www.who.int/news-room/fact-sheets/detail/hantavirus" target="_blank" style="text-decoration:none">
        <button class="btn" style="font-size:11px">WHO Hantavirus Fact Sheet ↗</button>
      </a>
    </div>

  </div>

  <!-- Map -->
  <div class="map-container" id="map-container">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <svg id="map-svg"></svg>

    <!-- Zoom controls -->
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
      <button class="zoom-btn" id="zoom-out" title="Zoom out">−</button>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loading-spinner"></div>
      <div class="loading-text">FETCHING WHO DATA</div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-role" id="tt-role"></div>
      <div class="tt-meta" id="tt-meta"></div>
      <div class="tt-evidence" id="tt-evidence"></div>
    </div>
  </div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <div class="status-item">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
  <div class="status-item" id="status-article" style="display:none">
    ARTICLE: <a href="#" id="status-article-link" target="_blank" style="color:var(--accent);text-decoration:none">—</a>
  </div>
</div>

<!-- D3 & TopoJSON via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
//  WHO HANTAVIRUS TRACKER — Frontend
// ═══════════════════════════════════════════════════════════

const ROLE_COLORS = {
  cases: 'var(--color-cases)',
  exposure: 'var(--color-exposure)',
  monitoring: 'var(--color-monitoring)',
  mentioned: 'var(--color-mentioned)',
  none: 'var(--color-land)',
};
const ROLE_LABELS = {
  cases: 'ACTIVE CASES',
  exposure: 'EXPOSURE',
  monitoring: 'MONITORING',
  mentioned: 'MENTIONED',
  none: 'NOT LISTED',
};
const MARKER_RADIUS = 8;
const WORLD_ATLAS_PATH = 'assets/world/countries-110m.json';
const DYNAMIC_OUTBREAK_PATH = 'api/outbreak';
const DYNAMIC_REFRESH_PATH = 'api/outbreak/refresh';
const STATIC_OUTBREAK_PATH = 'api/outbreak.json';

let outbreakData = null;
let countryRoleMap = {}; // iso3 → role
let topoData = null;
let svgSelection, gMap, projection, pathGen, zoom;
let currentTheme = localStorage.getItem('tracker-theme') || 'dark';

function applyTheme(theme) {
  currentTheme = theme === 'light' ? 'light' : 'dark';
  document.body.classList.toggle('light-theme', currentTheme === 'light');
  const themeBtn = document.getElementById('btn-theme');
  if (themeBtn) {
    themeBtn.textContent = currentTheme === 'light' ? 'Dark Theme' : 'White Theme';
  }
  localStorage.setItem('tracker-theme', currentTheme);
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  applyTheme(currentTheme);
  await loadMap();
  await loadOutbreakData();
}

// ── Load TopoJSON world map ───────────────────────────────
async function loadMap() {
  setStatus('loading', 'Loading world topology...');
  topoData = await d3.json(WORLD_ATLAS_PATH);
  renderMap();
}

async function fetchJson(url, options = {}) {
  const response = await fetch(url, options);
  if (!response.ok) {
    throw new Error(`${url} returned ${response.status}`);
  }
  return response.json();
}

async function fetchOutbreakPayload(forceRefresh) {
  const dynamicUrl = forceRefresh ? DYNAMIC_REFRESH_PATH : DYNAMIC_OUTBREAK_PATH;
  const dynamicOptions = forceRefresh ? { method: 'POST' } : { method: 'GET' };

  try {
    const payload = await fetchJson(dynamicUrl, dynamicOptions);
    return { payload, staticSnapshot: false };
  } catch (dynamicError) {
    const staticUrl = forceRefresh
      ? `${STATIC_OUTBREAK_PATH}?ts=${Date.now()}`
      : STATIC_OUTBREAK_PATH;
    const payload = await fetchJson(staticUrl);
    return { payload, staticSnapshot: true };
  }
}

// ── Render the base map ───────────────────────────────────
function renderMap() {
  const container = document.getElementById('map-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  const svg = d3.select('#map-svg')
    .attr('width', W)
    .attr('height', H);

  svg.selectAll('*').remove();

  const allCountries = topojson.feature(topoData, topoData.objects.countries).features;
  const countries = allCountries.filter(d => Number(d.id) !== 10);
  const mapFrame = {
    type: 'FeatureCollection',
    features: countries.filter(d => Math.abs(d3.geoCentroid(d)[1]) < 83),
  };

  projection = d3.geoNaturalEarth1()
    .fitExtent([[18, 18], [W - 18, H - 18]], mapFrame);

  pathGen = d3.geoPath().projection(projection);

  // Zoom behaviour
  zoom = d3.zoom()
    .scaleExtent([0.8, 12])
    .on('zoom', (event) => {
      gMap.attr('transform', event.transform);
    });
  svg.call(zoom);

  gMap = svg.append('g');

  // Sphere (ocean)
  gMap.append('path')
    .datum({type: 'Sphere'})
    .attr('class', 'sphere')
    .attr('d', pathGen);

  // Graticule
  gMap.append('path')
    .datum(d3.geoGraticule()())
    .attr('class', 'graticule')
    .attr('d', pathGen);

  // Countries
  const renderedCountries = countries;

  // Build numeric id → iso3 lookup via a quick hardcoded subset + name matching
  gMap.append('g')
    .attr('class', 'countries-group')
    .selectAll('path')
    .data(renderedCountries)
    .join('path')
    .attr('class', 'country')
    .attr('data-id', d => d.id)
    .attr('data-role', 'none')
    .attr('d', pathGen)
    .on('mouseover', onCountryHover)
    .on('mousemove', onTooltipMove)
    .on('mouseout', onCountryOut)
    .on('click', onCountryClick);

  // Markers group (above countries)
  gMap.append('g').attr('class', 'markers-group');

  // Zoom buttons
  document.getElementById('zoom-in').onclick = () => svg.transition().call(zoom.scaleBy, 1.5);
  document.getElementById('zoom-out').onclick = () => svg.transition().call(zoom.scaleBy, 0.67);
  document.getElementById('btn-reset-zoom').onclick = () => {
    svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity);
  };

  svgSelection = svg;
}

// ── Load outbreak data from API ───────────────────────────
async function loadOutbreakData(forceRefresh = false) {
  setStatus('loading', forceRefresh ? 'Refreshing WHO data...' : 'Fetching WHO outbreak data...');
  showOverlay(true);

  try {
    const { payload: data, staticSnapshot } = await fetchOutbreakPayload(forceRefresh);

    if (!data.ok && !data.fallback) {
      throw new Error(data.error || 'API returned error');
    }

    outbreakData = data.fallback || data;
    const isFallback = Boolean(outbreakData.isFallback || data.isFallback);

    applyOutbreakData(outbreakData, data.fetchedAt, isFallback);
    if (staticSnapshot) {
      setStatus('ok', isFallback ? 'Static fallback snapshot loaded' : 'Static WHO snapshot loaded');
    } else {
      setStatus('ok', isFallback ? 'Using fallback data (WHO fetch failed)' : 'WHO data loaded');
    }
  } catch (err) {
    console.error('Failed to load outbreak data:', err);
    setStatus('error', 'Failed to fetch WHO data — check server logs');
  } finally {
    showOverlay(false);
  }
}

// ── Apply outbreak data to map ────────────────────────────
function applyOutbreakData(data, fetchedAt, isFallback) {
  // Build role map
  countryRoleMap = {};
  (data.countries || []).forEach(c => {
    countryRoleMap[c.iso3] = c;
  });

  // Update country fills
  updateCountryFills();

  // Place markers
  renderMarkers(data.markers || []);

  // Update sidebar
  updateSidebar(data, fetchedAt, isFallback);
}

// ── Country fills ─────────────────────────────────────────
function updateCountryFills() {
  if (!topoData) return;

  // Build numeric id → iso3 mapping from TopoJSON names
  // TopoJSON numeric IDs are ISO 3166-1 numeric; we need alpha-3
  // We'll match by manually mapping the most common ones + checking our data
  const numToAlpha3 = buildNumericToAlpha3Map();

  d3.selectAll('.country')
    .attr('data-role', function(d) {
      const alpha3 = numToAlpha3[d.id] || null;
      if (alpha3 && countryRoleMap[alpha3]) {
        return countryRoleMap[alpha3].role;
      }
      return 'none';
    })
    .attr('data-alpha3', function(d) {
      return numToAlpha3[d.id] || '';
    });
}

// ── Render case/death markers ─────────────────────────────
function renderMarkers(markers) {
  if (!projection) return;
  const g = d3.select('.markers-group');
  g.selectAll('*').remove();

  const projectedMarkers = markers
    .map(m => {
      const point = projection([m.lon, m.lat]);
      if (!point) return null;
      return { ...m, x: point[0], y: point[1] };
    })
    .filter(Boolean);

  const groups = new Map();
  projectedMarkers.forEach(marker => {
    const key = `${marker.lon.toFixed(4)}:${marker.lat.toFixed(4)}`;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(marker);
  });

  groups.forEach(group => {
    const ordered = group.slice().sort((left, right) => left.type.localeCompare(right.type));
    const spread = ordered.length > 1 ? 16 : 0;

    ordered.forEach((m, index) => {
      const offsetIndex = index - (ordered.length - 1) / 2;
      const x = m.x + offsetIndex * spread;
      const y = m.y;

      if (m.type === 'death') {
        const deathGroup = g.append('g')
          .attr('class', 'marker-death-group')
          .attr('transform', `translate(${x},${y})`)
          .on('mouseover', (event) => showTooltip(event, m.label, m.type, m.iso3, m))
          .on('mousemove', onTooltipMove)
          .on('mouseout', hideTooltip);

        deathGroup.append('circle')
          .attr('class', 'marker-death-badge')
          .attr('r', MARKER_RADIUS);

        deathGroup.append('text')
          .attr('class', 'marker-death-count')
          .text(m.count || '');

        deathGroup.append('text')
          .attr('class', 'marker-death-icon')
          .attr('y', -11)
          .text('☠');
      } else {
        const markerGroup = g.append('g')
          .attr('class', 'marker-case-group')
          .attr('transform', `translate(${x},${y})`)
          .on('mouseover', (event) => showTooltip(event, m.label, m.type, m.iso3, m))
          .on('mousemove', onTooltipMove)
          .on('mouseout', hideTooltip);

        markerGroup.append('circle')
          .attr('class', 'marker-case')
          .attr('r', MARKER_RADIUS);

        markerGroup.append('text')
          .attr('class', 'marker-case-count')
          .text(m.count || '');
      }
    });
  });
}

// ── Sidebar update ────────────────────────────────────────
function updateSidebar(data, fetchedAt, isFallback) {
  // Header subtitle
  const summaryBits = [];
  if (data.summary?.totalCases != null) summaryBits.push(`${data.summary.totalCases} cases`);
  if (data.summary?.confirmedCases != null) summaryBits.push(`${data.summary.confirmedCases} confirmed`);
  if (data.summary?.deaths != null) summaryBits.push(`${data.summary.deaths} deaths`);
  document.getElementById('header-subtitle').textContent =
    [data.title || 'WHO Outbreak Report', ...summaryBits].join(' | ');

  // Fetched at
  if (fetchedAt) {
    const dt = new Date(fetchedAt);
    document.getElementById('fetched-at-label').textContent =
      dt.toLocaleTimeString() + ' ' + dt.toLocaleDateString();
  }

  // Freshness badge
  const badge = document.getElementById('freshness-badge');
  badge.textContent = isFallback ? 'FALLBACK' : 'LIVE';
  badge.style.borderColor = isFallback ? 'var(--color-monitoring)' : 'var(--color-cases)';
  badge.style.color = isFallback ? 'var(--color-monitoring)' : 'var(--color-cases)';

  // Counts
  const roles = ['cases', 'exposure', 'monitoring', 'mentioned'];
  for (const role of roles) {
    const n = (data.countries || []).filter(c => c.role === role).length;
    document.getElementById(`count-${role}`).textContent = n || '0';
  }

  // Article link in statusbar
  if (data.articleUrl) {
    const el = document.getElementById('status-article');
    el.style.display = 'flex';
    const link = document.getElementById('status-article-link');
    link.href = data.articleUrl;
    link.textContent = data.articleUrl.replace('https://www.who.int', '');
  }

  // Country list
  const listEl = document.getElementById('country-list');
  listEl.innerHTML = '';

  const sorted = [...(data.countries || [])].sort((a, b) => {
    const order = ['cases', 'exposure', 'monitoring', 'mentioned'];
    return order.indexOf(a.role) - order.indexOf(b.role);
  });

  if (sorted.length === 0) {
    listEl.innerHTML = '<div style="padding:12px 16px;font-family:DM Mono,monospace;font-size:11px;color:var(--text-dim)">No countries found in report.</div>';
    return;
  }

  sorted.forEach(c => {
    const color = ROLE_COLORS[c.role] || ROLE_COLORS.none;
    const caseSuffix = c.caseCount ? ` (${c.caseCount})` : '';
    const evidenceSnippet = c.evidence?.[0] || 'WHO sentence reference unavailable.';
    const div = document.createElement('div');
    div.className = 'country-item';
    div.innerHTML = `
      <div class="country-dot" style="background:${color}"></div>
      <div class="country-copy">
        <span class="country-name">${c.name}${caseSuffix}</span>
        <div class="country-evidence">${evidenceSnippet}</div>
      </div>
      <span class="country-role-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">
        ${(c.role || 'N/A').toUpperCase()}
      </span>
    `;
    div.onclick = () => focusCountry(c.iso3, c.name);
    listEl.appendChild(div);
  });
}

// ── Focus a country ───────────────────────────────────────
function focusCountry(iso3, name) {
  // Find the path with this alpha3
  const path = d3.selectAll('.country').filter(function() {
    return d3.select(this).attr('data-alpha3') === iso3;
  });
  if (path.empty()) return;

  const bounds = pathGen.bounds(path.datum());
  const dx = bounds[1][0] - bounds[0][0];
  const dy = bounds[1][1] - bounds[0][1];
  const cx = (bounds[0][0] + bounds[1][0]) / 2;
  const cy = (bounds[0][1] + bounds[1][1]) / 2;

  const W = svgSelection.node().clientWidth;
  const H = svgSelection.node().clientHeight;
  const scale = Math.min(8, 0.85 / Math.max(dx / W, dy / H));
  const translate = [W / 2 - scale * cx, H / 2 - scale * cy];

  svgSelection.transition().duration(700)
    .call(zoom.transform, d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale));
}

// ── Tooltip helpers ───────────────────────────────────────
const numToAlpha3Cached = buildNumericToAlpha3Map();

function onCountryHover(event, d) {
  const alpha3 = numToAlpha3Cached[d.id] || null;
  const info = alpha3 ? countryRoleMap[alpha3] : null;
  const name = info ? info.name : `Country #${d.id}`;
  const role = info ? info.role : 'none';
  showTooltip(event, name, role, alpha3);
}
function onCountryOut() { hideTooltip(); }
function onCountryClick(event, d) {
  const alpha3 = numToAlpha3Cached[d.id] || null;
  if (alpha3) focusCountry(alpha3, '');
}
function onTooltipMove(event) {
  const tt = document.getElementById('tooltip');
  const container = document.getElementById('map-container');
  const rect = container.getBoundingClientRect();
  let x = event.clientX - rect.left + 14;
  let y = event.clientY - rect.top - 14;
  if (x + 230 > rect.width) x -= 250;
  if (y + 80 > rect.height) y -= 80;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}
function showTooltip(event, name, role, alpha3, markerMeta) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = name;
  const roleEl = document.getElementById('tt-role');
  const color = ROLE_COLORS[role] || ROLE_COLORS.none;
  roleEl.textContent = ROLE_LABELS[role] || role.toUpperCase();
  roleEl.style.background = color + '22';
  roleEl.style.color = color;
  roleEl.style.border = `1px solid ${color}55`;

  const meta = document.getElementById('tt-meta');
  if (role === 'cases') meta.textContent = 'Countries with active or recently managed cases';
  else if (role === 'exposure') meta.textContent = 'Known or likely exposure source';
  else if (role === 'monitoring') meta.textContent = 'Under public health surveillance';
  else if (role === 'mentioned') meta.textContent = 'Referenced in WHO response';
  else meta.textContent = '';

  if (role === 'death' || role === 'case') {
    roleEl.textContent = role === 'death' ? '💀 FATALITY' : '⬤ ACTIVE CASE';
    meta.textContent = role === 'case'
      ? `${markerMeta?.count || 0} case${markerMeta?.count === 1 ? '' : 's'} mapped to this location from the WHO report`
      : `${markerMeta?.count || 0} death${markerMeta?.count === 1 ? '' : 's'} mapped to this location from the WHO report`;
  }

  const evidence = markerMeta?.evidence
    ? markerMeta.evidence
    : alpha3 && countryRoleMap[alpha3]?.evidence?.length
    ? countryRoleMap[alpha3].evidence[0]
    : outbreakData?.articleUrl
      ? `WHO source: ${outbreakData.articleUrl}`
      : '';
  const evidenceEl = document.getElementById('tt-evidence');
  evidenceEl.textContent = evidence ? `WHO reference: ${evidence}` : '';
  evidenceEl.style.display = evidence ? 'block' : 'none';

  onTooltipMove(event);
  tt.classList.add('visible');
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('visible');
}

// ── Status helpers ────────────────────────────────────────
function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  dot.className = 'status-dot ' + (type === 'ok' ? '' : type);
  statusText.textContent = text;
}
function showOverlay(visible) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !visible);
}

// ── Refresh button ────────────────────────────────────────
document.getElementById('btn-refresh').onclick = async function() {
  this.disabled = true;
  await loadOutbreakData(true);
  this.disabled = false;
};
document.getElementById('btn-theme').onclick = function() {
  applyTheme(currentTheme === 'light' ? 'dark' : 'light');
};

// ── Resize handler ────────────────────────────────────────
window.addEventListener('resize', () => {
  if (topoData) {
    renderMap();
    if (outbreakData) applyOutbreakData(outbreakData, null, Boolean(outbreakData.isFallback));
  }
});

// ── Start ─────────────────────────────────────────────────
init();
</script>
